<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title and page.title != '' %}{{ page.title }} | {% endif %}{{ site.title }}</title>
{% if site.description %}<meta name="description" content="{{ site.description | strip_html | strip_newlines | escape_once }}">{% endif %}

<link rel="icon" type="image/png" sizes="32x32" href="{{ '/images/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/images/favicon-16x16.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/images/apple-touch-icon.png' | relative_url }}">
<link rel="manifest" href="{{ '/images/site.webmanifest' | relative_url }}">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
